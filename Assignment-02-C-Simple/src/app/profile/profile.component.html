<div class="container">
  <div class="page-box profile-box" *ngIf="user">
    <h2 class="mb-4 text-center">Profile Component</h2>

    <table class="table table-bordered">
      <tbody>
        <tr>
          <th>Name</th>
          <td>{{ user.name }}</td>
        </tr>
        <tr>
          <th>Email</th>
          <td>{{ user.email }}</td>
        </tr>
        <tr>
          <th>Phone</th>
          <td>{{ user.phone }}</td>
        </tr>
        <tr>
          <th>City</th>
          <td>{{ user.city }}</td>
        </tr>
        <tr>
          <th>Username</th>
          <td>{{ user.username }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
