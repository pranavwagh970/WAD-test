<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecommerce Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand" href="#">Ecommerce Admin</a>
    </div>
  </nav>

  <div class="offcanvas-lg offcanvas-start bg-dark text-white sidebar" tabindex="-1" id="sidebar">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
      <ul class="nav flex-column w-100">
        <li class="nav-item">
          <a class="nav-link active" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Orders</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Customers</a>
        </li>
      </ul>
    </div>
  </div>

  <main class="dashboard-content">
    <div class="container-fluid">
      <h2 class="mb-4">Dashboard</h2>

      <div class="row g-3">
        <div class="col-sm-6 col-xl-3">
          <div class="card text-bg-primary">
            <div class="card-body">
              <h5 class="card-title">Total Sales</h5>
              <p class="card-text display-6">$12,500</p>
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-xl-3">
          <div class="card text-bg-success">
            <div class="card-body">
              <h5 class="card-title">Orders</h5>
              <p class="card-text display-6">320</p>
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-xl-3">
          <div class="card text-bg-warning">
            <div class="card-body">
              <h5 class="card-title">Products</h5>
              <p class="card-text display-6">85</p>
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-xl-3">
          <div class="card text-bg-danger">
            <div class="card-body">
              <h5 class="card-title">Customers</h5>
              <p class="card-text display-6">1,240</p>
            </div>
          </div>
        </div>
      </div>

      <p class="mt-4 text-muted">
        This dashboard uses Bootstrap cards and grid classes to show ecommerce statistics in a responsive layout.
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
