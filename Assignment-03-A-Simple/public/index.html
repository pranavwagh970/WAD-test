<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Static Website</h1>
    <p>This website is served using a Node.js application.</p>
  </header>

  <main>
    <section>
      <h2>About</h2>
      <p>Node.js reads this HTML file from the public folder and sends it to the browser.</p>
    </section>

    <section>
      <h2>Features</h2>
      <ul>
        <li>Simple Node.js server</li>
        <li>Static HTML and CSS files</li>
        <li>No external package required</li>
      </ul>
    </section>
  </main>
</body>

</html>
